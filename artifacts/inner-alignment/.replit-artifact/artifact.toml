kind = "web"
previewPath = "/"
title = "Inner Alignment Coaching"
version = "1.0.0"
id = "artifacts/inner-alignment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24806
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/inner-alignment run dev"

[services.env]
PORT = "24806"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/inner-alignment", "run", "build"]
publicDir = "artifacts/inner-alignment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
