packages:
  "framer-motion": "For smooth scroll animations and page transitions"
  "react-hook-form": "For robust contact form state management"
  "@hookform/resolvers": "For integrating Zod validation with the contact form"
  "zod": "For contact form schema validation"
  "clsx": "For class name merging"
  "tailwind-merge": "For merging tailwind classes safely"

images:
  - path: "artifacts/inner-alignment/public/images/hero-bg.png"
    description: "A calming, serene, and minimal landscape, soft morning mist over a tranquil lake with gentle rolling hills in the distance. Watercolor style, painted with warm earthy tones, soft sage greens, and creamy whites. Highly aesthetic, peaceful, spiritual but grounded, giving a sense of clarity and space. No text."
    aspect_ratio: "16:9"
  - path: "artifacts/inner-alignment/public/images/abstract-nature.png"
    description: "Abstract flowing organic shapes, inspired by nature and leaves. Minimalist, textured watercolor effect. Soft sage green, warm cream, and subtle terracotta tones. Elegant, spiritual, therapeutic, and calming."
    aspect_ratio: "1:1"

notes:
  - Static frontend-only application.
  - No backend API integrations required.
  - Contact form simulates submission with a success state.
